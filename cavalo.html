<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Turfe Amigo</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>


    <div class="banner"></div>


    <div class="ListaCavalos">

        <h1>Turfe Amigo</h1>

        <p>Aposte em uma Little Pony</p>

        <div class="opcoesCavalo">

            <img src="./Imagens/pony1.png" onclick="selecionarFoto(this, 'Cavalo 1')">

            <img src="./Imagens/pony2.png" onclick="selecionarFoto(this, 'Cavalo 2')">

            <img src="./Imagens/pony3.png" onclick="selecionarFoto(this, 'Cavalo 3')">

            <img src="./Imagens/pony6.png" onclick="selecionarFoto(this, 'Cavalo 4')">

            <img src="./Imagens/pony5.png" onclick="selecionarFoto(this, 'Cavalo 5')">

        </div>

        <div class="bot">

            <button id="apostar" onclick="apostar()">
                Apostar
            </button>

        </div>

    </div>


    
    <div id="msg"></div>

</body>

</html>
<script>

let poneiEscolhido = "";

function selecionarFoto(imgEscolhida, ponei){
    poneiEscolhido = ponei;

    let fotos = document.querySelectorAll(".opcoesCavalo img");

    fotos.forEach(foto => {
        foto.classList.remove("selecionado");
    });


    imgEscolhida.classList.add("selecionado");
}

    let vt_cavalo1 = [];
    let vt_cavalo2 = [];
    let vt_cavalo3 = [];
    let vt_cavalo4 = [];
    let vt_cavalo5 = [];

function apostar(){

    let soma1 = 0;
    let soma2 = 0;
    let soma3 = 0;
    let soma4 = 0;
    let soma5 = 0;

    for(let i = 1; i <= 7; i++){

        soma1 += Number((Math.random() * 2 + 7).toFixed(1));
        soma2 += Number((Math.random() * 2 + 7).toFixed(1));
        soma3 += Number((Math.random() * 2 + 7).toFixed(1));
        soma4 += Number((Math.random() * 2 + 7).toFixed(1));
        soma5 += Number((Math.random() * 2 + 7).toFixed(1));

    }

    let vencedor = "Cavalo 1";
    let maior = soma1;

    if(soma2 > maior){
        maior = soma2;
        vencedor = "Cavalo 2";
    }

    if(soma3 > maior){
        maior = soma3;
        vencedor = "Cavalo 3";
    }

    if(soma4 > maior){
        maior = soma4;
        vencedor = "Cavalo 4";
    }

    if(soma5 > maior){
        maior = soma5;
        vencedor = "Cavalo 5";
    }
document.querySelector(".opcoesCavalo").style.display = "none";

document.querySelector(".bot").style.display = "none";

document.querySelector(".ListaCavalos p").style.display = "none";


msg.style.display = "block";

    msg.innerHTML = `

    <h1>RESULTADO FINAL</h1>

    <hr>

    Cavalo 1: ${soma1.toFixed(1)} metros <br><br>

    Cavalo 2: ${soma2.toFixed(1)} metros <br><br>

    Cavalo 3: ${soma3.toFixed(1)} metros <br><br>

    Cavalo 4: ${soma4.toFixed(1)} metros <br><br>

    Cavalo 5: ${soma5.toFixed(1)} metros <br><br>

    <hr>
    ` ;
    if(vencedor == poneiEscolhido){

    msg.innerHTML += `
    
    <h2> ${vencedor} venceu!</h2>

    <p>Parabéns! Você ganhou a aposta 🎉</p>
    <button onclick="voltar()" class="voltar">Voltar</button>
    
    `;

} else {

    msg.innerHTML += `
    
    <h2> ${vencedor} venceu!</h2>

    <p>Que pena, você perdeu!</p>
    <button onclick="voltar()" class="voltar">Voltar</button>
    
    `;
}
}
function voltar(){

    location.reload();

}

</script>
