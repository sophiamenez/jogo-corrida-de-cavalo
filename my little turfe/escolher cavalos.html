<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escolher cavalos</title>
    <link rel="stylesheet" href="escolher cavalos.css">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="escolher-cavalos">
        <div class="texto-escolher-cavalos">
            <h1>Agora é a hora de escolher quais cavalos você quer apostar!</h1>
            <h2>Clique em quais você tem interesse</h2>
            <h3>Escolha de 2 a 6 cavalinhos</h3>
            <div class="opcoesCavalo">

                <img src="./Imagens/pony1.png" onclick="selecionarFoto(this, 'Cavalo 1')">

                <img src="./Imagens/pony2.png" onclick="selecionarFoto(this, 'Cavalo 2')">

                <img src="./Imagens/pony3.png" onclick="selecionarFoto(this, 'Cavalo 3')">

                <img src="./Imagens/pony6.png" onclick="selecionarFoto(this, 'Cavalo 4')">

                <img src="./Imagens/pony5.png" onclick="selecionarFoto(this, 'Cavalo 5')">

                <img src="./Imagens/poney7.png" onclick="selecionarFoto(this, 'Cavalo 6')">
            </div>

            <div class="hero-botoes">
                <button onclick="irParaAposta()" class="btApostar">
                    Ir para a aposta!
                </button>
            </div>
        </div>
    </div>
</body>

</html>
<script>

    let cavalosSelecionados = [];

    function selecionarFoto(imgEscolhida, cavalo) {

        if (imgEscolhida.classList.contains("selecionado")) {

            imgEscolhida.classList.remove("selecionado");

            cavalosSelecionados =
                cavalosSelecionados.filter(
                    item => item !== cavalo
                );

        } else {

            if (cavalosSelecionados.length >= 6) {
                alert("Você pode selecionar no máximo 6 cavalinhos!");
                return;
            }

            imgEscolhida.classList.add("selecionado");

            cavalosSelecionados.push(cavalo);
        }

        console.log(cavalosSelecionados);
    }

    function irParaAposta() {

        if (cavalosSelecionados.length < 2) {
            alert("Escolha pelo menos 2 cavalinhos!");
            return;
        }

        localStorage.setItem(
            "cavalosSelecionados",
            JSON.stringify(cavalosSelecionados)
        );

        window.location.href = "aposta.html";
    }

</script>
