<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escolher Cavalos</title>

    <link rel="stylesheet" href="escolher cavalos.css">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <!-- TELA 1 - ESCOLHA DOS CAVALOS -->
    <div id="tela1" class="escolher-cavalos">

        <div class="texto-escolher-cavalos">

            <h1>Agora é a hora de escolher quais cavalos você quer apostar!</h1>

            <h2>Clique nos cavalos que você tem interesse</h2>

            <h3>Escolha de 2 a 6 cavalinhos</h3>

            <div class="opcoesCavalo">

                <img src="./Imagens/pony1.png" alt="Cavalo 1" onclick="selecionarFoto(this, 'Cavalo 1')">

                <img src="./Imagens/pony2.png" alt="Cavalo 2" onclick="selecionarFoto(this, 'Cavalo 2')">

                <img src="./Imagens/pony3.png" alt="Cavalo 3" onclick="selecionarFoto(this, 'Cavalo 3')">

                <img src="./Imagens/pony6.png" alt="Cavalo 4" onclick="selecionarFoto(this, 'Cavalo 4')">

                <img src="./Imagens/pony5.png" alt="Cavalo 5" onclick="selecionarFoto(this, 'Cavalo 5')">

                <img src="./Imagens/poney7.png" alt="Cavalo 6" onclick="selecionarFoto(this, 'Cavalo 6')">

            </div>

            <div class="hero-botoes">
                <button onclick="irParaAposta()" class="btApostar">
                    Ir para a aposta!
                </button>
            </div>

        </div>
    </div>

    <!-- TELA 2 - CONFIGURAÇÃO DA CORRIDA -->
    <div id="tela2" style="display: none;">

        <div class="escolher-cavalos">

            <div class="texto-escolher-cavalos">

                <h1 id="tituloNomear">
                    Configuração da Corrida
                </h1>

                <div id="inputsCavalos"></div>

                <div class="campo-voltas">

                    <label for="inputVoltas">
                        Quantidade de voltas (5 a 10):
                    </label>

                    <input type="number" id="inputVoltas" placeholder="Digite entre 5 e 10">
                </div>

                <div class="hero-botoes-cadastrar">

                    <button onclick="jogar()" class="btCadastrar">
                        Iniciar corrida
                    </button>
                </div>
            </div>

        </div>

    </div>

    <!-- TELA 3 - RESULTADOS -->
    <div id="apostas" style="display: none;">

        <div id="pista">
            <div class="meta"></div>
        </div>
    </div>
    <div id="msg"></div>

    <div id="telaResultado" style="display: none;">


        <div id="podium"></div>

        <div id="resultado"></div>

    </div>
</body>

</html>
<script>

    let cavalosSelecionados = [];


    function selecionarFoto(imgEscolhida, cavalo) {

        if (imgEscolhida.classList.contains("selecionado")) {

            imgEscolhida.classList.remove("selecionado");

            cavalosSelecionados =
                cavalosSelecionados.filter(
                    item => item !== cavalo
                );

        }
        else {

            if (cavalosSelecionados.length >= 6) {
                alert("Você pode selecionar no máximo 6 cavalinhos!");
                return;
            }

            imgEscolhida.classList.add("selecionado");

            cavalosSelecionados.push(cavalo);
        }

        console.log(cavalosSelecionados);
    }

    function irParaAposta() {

        if (cavalosSelecionados.length < 2) {
            alert("Escolha pelo menos 2 cavalinhos!");
            return;
        }

        document.getElementById("tela1").style.display = "none";
        document.getElementById("tela2").style.display = "block";

        let divInputs = document.getElementById("inputsCavalos");

        divInputs.innerHTML = "";

        for (let i = 0; i < cavalosSelecionados.length; i++) {

            divInputs.innerHTML += `<input type="text" id="inputCavalo${i}" placeholder="Nome do ${cavalosSelecionados[i]}">
            <br><br>`;
        }
    }

    var gifs = {
        "Cavalo 1": "./Imagens/poneyamarela.gif",
        "Cavalo 2": "./Imagens/ponei roxa.gif",
        "Cavalo 3": "./Imagens/poneycolorida.gif",
        "Cavalo 4": "./Imagens/poneyrosa.gif",
        "Cavalo 5": "./Imagens/poneycaipira.gif",
        "Cavalo 6": "./Imagens/poneybranca.gif"
    };


    function jogar() {

        let nomesCavalos = [];

        for (let i = 0; i < cavalosSelecionados.length; i++) {

            let nome = document.getElementById(`inputCavalo${i}`).value.trim();

            if (nome == "") {
                alert(`Digite o nome do ${cavalosSelecionados[i]}`);
                return;
            }

            nomesCavalos.push(nome);
        }

        let cavalos = cavalosSelecionados;

        let rodadas = Number(document.getElementById("inputVoltas").value);

        if (rodadas < 5 || rodadas > 10) {
            alert("Digite entre 5 e 10 voltas!");
            return;
        }

        document.getElementById("tela2").style.display = "none";
        document.getElementById("tela1").style.display = "none";
        document.getElementById("apostas").style.display = "block";

        let estados = cavalos.map((cavalo, i) => ({
            nome: nomesCavalos[i],
            tipo: cavalo,
            total: 0,
            voltas: []
        }));


        let pista = document.getElementById("pista");
        pista.innerHTML = "";

        pista.innerHTML = '<div class="meta"></div>';

        for (let i = 0; i < estados.length; i++) {
            let faixa = document.createElement("div");

            faixa.className = "faixa";
            faixa.style.top = `${i * 100}px`;

            pista.appendChild(faixa); 
        }

        estados.forEach((cavalo, index) => {

            let img = document.createElement("img");

            img.src = gifs[cavalo.tipo];
            img.className = "cavaloCorrida";

            img.style.top = `${index * 100 + 10}px`;
            img.id = `cavalo${index}`;

            pista.appendChild(img);

            cavalo.elemento = img;
        });

        let voltaAtual = 0;
        let corrida = setInterval(() => {
            voltaAtual++;

            estados.forEach(cavalo => {

                var META = 1220;

                let ganho =
                    (META / rodadas) *
                    (0.8 + Math.random() * 0.4);

                cavalo.total += ganho;

                cavalo.voltas.push(ganho);

                cavalo.elemento.style.left =
                    cavalo.total + "px";

            });

            if (voltaAtual >= rodadas) {
                console.log("FIM DA CORRIDA");

                clearInterval(corrida);

                document.getElementById("apostas").style.display = "none";

                document.getElementById("telaResultado").style.display = "block";

                mostrarResultados(estados);
                mostrarPodium(estados);
            }

        }, 1000);
    }


    function mostrarResultados(resultado) {

        let texto = "<h2>Resultado por Volta</h2>";

        resultado.forEach(cavalo => {

            texto += `<br><b>${cavalo.nome}</b><br>`;

            cavalo.voltas.forEach((v, i) => {

                texto += `Volta ${i + 1}: ${v.toFixed(2)}<br>`;
            });

            texto += `<b>Total: ${cavalo.total.toFixed(2)}</b><br><br>`;
        });

        document.getElementById("resultado").innerHTML = texto;
    }
    function mostrarPodium(resultado) {

        let ordenado = [...resultado].sort((a, b) => b.total - a.total);

        let podium = [];
        let posicao = 1;

        for (let i = 0; i < ordenado.length; i++) {

            if (i === 0) {

                podium.push({
                    pos: posicao,
                    cavalos: [ordenado[i]]
                });

            } else {

                let anterior = ordenado[i - 1];

                if (Math.abs(ordenado[i].total - anterior.total) < 0.0001) {

                    podium[podium.length - 1].cavalos.push(ordenado[i]);

                } else {

                    posicao++;

                    if (posicao > 3) break;

                    podium.push({
                        pos: posicao,
                        cavalos: [ordenado[i]]
                    });
                }
            }
        }

        let divPodium = document.getElementById("podium");

        divPodium.innerHTML = "<h2> Pódio Final</h2>";

        podium.forEach(p => {

            let nomes = p.cavalos
                .map(c => c.nome)
                .join(", ");

            let medalha = "";

            if (p.pos == 1) {
                medalha = "";
            }
            else if (p.pos == 2) {
                medalha = "";
            }
            else {
                medalha = "";
            }

            divPodium.innerHTML += `
        <p>${medalha} <b>${p.pos}º lugar:</b> ${nomes}</p>
    `;
        });
    }





</script>
